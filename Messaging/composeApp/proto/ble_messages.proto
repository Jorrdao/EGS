syntax = "proto3";
package com.sos.messaging.offline.proto;
option java_package = "com.sos.messaging.offline.proto";
option java_multiple_files = true;

// BLE_BROADCAST /p2p/presence
message BlePresence {
  string user_id   = 1;
  double lat       = 2;
  double lng       = 3;
  int64  timestamp = 4;
}

// BLE_SEND /p2p/mesh/message
message BleMeshMessage {
  string message_id      = 1;
  string sender_id       = 2;
  string destination_id  = 3;
  bytes  payload         = 4; // AES-encrypted text
  int32  ttl             = 5;
}

// BLE_REQ /p2p/marketplace/sync
message BleMarketplaceRequest {
  string requester_id = 1;
  int64  last_sync_ts = 2;
}

// BLE_RES /p2p/marketplace/data
message BleMarketplaceResponse {
  repeated Announcement announcements = 1;
}

message Announcement {
  string id          = 1;
  string title       = 2;
  string description = 3;
  double lat         = 4;
  double lng         = 5;
}