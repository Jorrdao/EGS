apiVersion: v1
kind: ConfigMap
metadata:
  name: stormos-init-sql
  namespace: tenant-grupo7-egs-deti-ua-pt
data:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS postgis;

    CREATE TABLE devices (
        id SERIAL PRIMARY KEY,
        device_id VARCHAR(255) NOT NULL,
        location GEOMETRY(Point, 4326) NOT NULL,
        accuracy FLOAT,
        created_at TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE TABLE marketplace_items (
        id SERIAL PRIMARY KEY,
        name VARCHAR(255) NOT NULL,
        description TEXT,
        price FLOAT NOT NULL,
        address VARCHAR(255),
        contact_info VARCHAR(255),
        location GEOMETRY(Point, 4326) NOT NULL,
        created_at TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE INDEX idx_devices_location ON devices USING GIST (location);
    CREATE INDEX idx_marketplace_items_location ON marketplace_items USING GIST (location);
