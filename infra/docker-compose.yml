version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# StormOS Monitoring Stack
#
# InfluxDB 2.x  → receives metrics from the Android app
# Grafana        → visualises the metrics
#
# Start:  docker compose up -d
# Stop:   docker compose down
#
# Grafana:  http://localhost:3000  (admin / stormos_admin)
# InfluxDB: http://localhost:8086  (admin / stormos_admin)
# ─────────────────────────────────────────────────────────────────────────────

services:

  influxdb:
    image: influxdb:2.7
    container_name: stormos_influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE:        setup
      DOCKER_INFLUXDB_INIT_USERNAME:    admin
      DOCKER_INFLUXDB_INIT_PASSWORD:    stormos_admin
      DOCKER_INFLUXDB_INIT_ORG:         stormos
      DOCKER_INFLUXDB_INIT_BUCKET:      stormos
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: stormos-super-secret-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.0
    container_name: stormos_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: stormos_admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  influxdb_data:
  grafana_data:
